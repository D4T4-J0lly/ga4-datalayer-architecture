<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Metrics & Data Pipeline Kit</title>
    
    <script>
        window.dataLayer = window.dataLayer || [];
    </script>

    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KWNR8DGP');</script>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: monospace, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .product-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .tag { background: rgba(88, 166, 255, 0.1); color: var(--accent-color); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        h1 { font-size: 24px; margin: 16px 0 8px 0; color: #ffffff; }
        .description { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .price-section { display: flex; align-items: baseline; margin-bottom: 24px; }
        .price { font-size: 32px; font-weight: bold; color: #ffffff; margin-right: 8px; }
        .currency { color: var(--text-muted); font-size: 14px; }
        
        .btn { display: block; width: 100%; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; margin-bottom: 12px; text-align: center; }
        .btn-primary { background-color: var(--accent-color); color: #ffffff; }
        .btn-success { background-color: var(--success-color); color: #ffffff; }
        .console-log-status { background: #040d21; border-left: 4px solid var(--accent-color); padding: 12px; font-size: 12px; color: #79c0ff; border-radius: 4px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KWNR8DGP"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="product-container">
        <span class="tag">Data & Analytics</span>
        <h1>Core Data Pipeline Kit</h1>
        <p class="description">Automatiza la recolección, limpieza y unificación de fuentes de datos de marketing. Incluye scripts optimizados en Python y esquemas de empaquetado listos para producción.</p>

        <div class="price-section">
            <span class="price">$149.00</span>
            <span class="currency">USD / pago único</span>
        </div>

        <button class="btn btn-primary" onclick="trackAddToCart()">Añadir al carrito</button>
        <button class="btn btn-success" onclick="trackPurchase()">Comprar ahora</button>

        <div id="statusBox" class="console-log-status"></div>
    </div>

    <script>
        const productData = { item_id: "KIT_PIPELINE_001", item_name: "Core Data Pipeline Kit", price: 149.00, currency: "USD", item_category: "Software", quantity: 1 };

        window.onload = function() {
            window.dataLayer.push({ 'ecommerce': null });
            window.dataLayer.push({ 'event': 'view_item', 'ecommerce': { 'currency': 'USD', 'value': 149.00, 'items': [productData] } });
            showStatus("GA4 Event: 'view_item' enviado al dataLayer.");
        };

        function trackAddToCart() {
            window.dataLayer.push({ 'ecommerce': null });
            window.dataLayer.push({ 'event': 'add_to_cart', 'ecommerce': { 'currency': 'USD', 'value': 149.00, 'items': [productData] } });
            showStatus("GA4 Event: 'add_to_cart' enviado al dataLayer.");
        }

        function trackPurchase() {
            window.dataLayer.push({ 'ecommerce': null });
            window.dataLayer.push({ 'event': 'purchase', 'ecommerce': { 'transaction_id': "T_" + Math.floor(Math.random() * 900000 + 100000), 'value': 149.00, 'currency': 'USD', 'items': [productData] } });
            showStatus("GA4 Event: 'purchase' enviado exitosamente con ID dinámico.");
        }

        function showStatus(msg) {
            const box = document.getElementById('statusBox');
            box.innerText = "⚡ " + msg;
            box.style.display = "block";
        }
    </script>
</body>
</html>
